name: Build Windows EXE

on:
  push:
    branches: ["main", "master"]
    tags: ["v*"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 设置 Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 下载 Everything SDK DLL
        run: |
          # 尝试多个下载源
          $downloadSuccess = $false
          $downloadUrls = @(
              "https://www.voidtools.com/Everything-SDK.zip",
              "https://github.com/voidtools/Everything/raw/master/Dependencies/EverythingSDK/bin/Release/x64/Everything64.dll",
              "https://raw.githubusercontent.com/voidtools/Everything/master/Dependencies/EverythingSDK/bin/Release/Win32/Everything.dll"
          )
          
          # 先尝试从 voidtools 下载完整 SDK
          try {
              Write-Host "尝试从 voidtools.com 下载 SDK..."
              $wc = New-Object System.Net.WebClient
              $wc.DownloadFile("https://www.voidtools.com/Everything-SDK.zip", "EverythingSDK.zip")
              Expand-Archive -Path "EverythingSDK.zip" -DestinationPath "EverythingSDK" -Force
              
              $dll64 = Get-ChildItem -Path "EverythingSDK" -Recurse -Filter "Everything64.dll" | Select-Object -First 1
              $dll32 = Get-ChildItem -Path "EverythingSDK" -Recurse -Filter "Everything.dll" | Select-Object -First 1
              
              if ($dll64) {
                  Copy-Item -Path $dll64.FullName -Destination "." -Force
                  Write-Host "已复制 Everything64.dll"
              }
              if ($dll32) {
                  Copy-Item -Path $dll32.FullName -Destination "." -Force
                  Write-Host "已复制 Everything.dll"
              }
              
              Remove-Item -Recurse -Force EverythingSDK
              Remove-Item -Force EverythingSDK.zip
              $downloadSuccess = $true
          } catch {
              Write-Host "从 voidtools.com 下载失败: $_"
          }
          
          # 如果上面失败，尝试直接下载单个 DLL
          if (-not $downloadSuccess) {
              Write-Host "尝试直接下载 DLL 文件..."
              $wc = New-Object System.Net.WebClient
              
              try {
                  $wc.DownloadFile("https://github.com/voidtools/Everything/releases/download/1.4.1.1015/Everything-1.4.1.1015.x64.zip", "Everything.zip")
                  Expand-Archive -Path "Everything.zip" -DestinationPath "Everything" -Force
                  
                  $dll64 = Get-ChildItem -Path "Everything" -Recurse -Filter "Everything64.dll" | Select-Object -First 1
                  if ($dll64) {
                      Copy-Item -Path $dll64.FullName -Destination "." -Force
                      Write-Host "已复制 Everything64.dll"
                      $downloadSuccess = $true
                  }
                  
                  Remove-Item -Recurse -Force Everything
                  Remove-Item -Force Everything.zip
              } catch {
                  Write-Host "下载失败: $_"
              }
          }
          
          # 验证文件存在
          Write-Host "验证 DLL 文件:"
          Get-ChildItem -Path "." -Filter "*.dll"
          
          # 检查是否成功获取到关键的 64 位 DLL
          if (-not (Test-Path "Everything64.dll")) {
              Write-Error "未能获取 Everything64.dll，构建无法继续"
              exit 1
          }
          
          Write-Host "DLL 文件下载完成"

      - name: 安装项目依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 验证依赖完整性
        run: |
          python -c "
          deps = ['docx', 'olefile', 'openpyxl', 'xlrd', 'pptx', 'pdfplumber', 'pyzipper']
          for d in deps:
              try:
                  __import__(d)
                  print(f'  OK: {d}')
              except ImportError:
                  print(f'  MISSING: {d}')
          "

      - name: 使用 PyInstaller 构建单文件 EXE
        run: |
          pyinstaller --clean --noconfirm sensitive_detector.spec

      - name: 验证构建产物
        run: |
          if (Test-Path "dist/SensitiveDetector.exe") {
              $file = Get-Item "dist/SensitiveDetector.exe"
              $sizeMB = [math]::Round($file.Length / 1MB, 2)
              Write-Host "构建成功！"
              Write-Host "  输出路径: $($file.FullName)"
              Write-Host "  文件大小: ${sizeMB}MB"
          } else {
              Write-Error "构建失败：dist/SensitiveDetector.exe 未找到"
              exit 1
          }

      - name: 上传 EXE 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: SensitiveDetector_Portable
          path: dist/SensitiveDetector.exe
          if-no-files-found: error

      - name: 创建 Release（仅当推送标签时）
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: dist/SensitiveDetector.exe
          generate_release_notes: true
          name: Release ${{ github.ref_name }}
